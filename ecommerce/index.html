<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopLite - E-commerce</title>
    <meta name="description" content="A simple e-commerce storefront" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🛍️</text></svg>">
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { DEFAULT: '#0ea5e9', dark: '#0284c7' } },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900">
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-4 flex items-center gap-4">
        <a href="#" class="flex items-center gap-3">
          <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-brand/10 text-brand text-xl">🛍️</span>
          <span class="text-xl font-semibold">ShopLite</span>
        </a>
        <div class="flex-1"></div>
        <div class="hidden md:flex items-center gap-2">
          <input id="searchInput" type="search" placeholder="Search products" class="w-64 rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          <select id="categorySelect" class="rounded-md border-gray-300 focus:border-brand focus:ring-brand">
            <option value="all">All Categories</option>
          </select>
        </div>
        <button id="cartButton" class="relative inline-flex items-center gap-2 rounded-md bg-brand px-4 py-2 text-white hover:bg-brand-dark">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 100 6 3 3 0 000-6zm9 0a3 3 0 100 6 3 3 0 000-6zM7.5 14.25h8.25m-8.25 0L5.106 5.272A1.125 1.125 0 004 4.5H3m4.5 9.75h10.757c.51 0 .955-.343 1.087-.835l1.5-5.625A1.125 1.125 0 0019.8 6.75H5.221" />
          </svg>
          <span>Cart</span>
          <span id="cartCount" class="absolute -top-2 -right-2 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-red-500 px-1 text-xs text-white">0</span>
        </button>
      </div>
      <div class="md:hidden border-t">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-2">
          <input id="searchInputMobile" type="search" placeholder="Search products" class="w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          <select id="categorySelectMobile" class="rounded-md border-gray-300 focus:border-brand focus:ring-brand">
            <option value="all">All Categories</option>
          </select>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
      <section class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-semibold">Products</h2>
        <div id="resultsMeta" class="text-sm text-gray-500"></div>
      </section>

      <section id="productsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6"></section>

      <template id="productCardTemplate">
        <article class="group rounded-lg border bg-white overflow-hidden shadow-sm hover:shadow-md transition">
          <div class="relative">
            <img class="h-44 w-full object-cover" alt="" />
            <button class="absolute top-2 left-2 rounded-md bg-white/90 px-2 py-1 text-xs">New</button>
          </div>
          <div class="p-3 sm:p-4">
            <h3 class="line-clamp-2 font-medium"></h3>
            <p class="mt-1 text-sm text-gray-500"></p>
            <div class="mt-3 flex items-center justify-between">
              <span class="text-lg font-semibold"></span>
              <button class="addToCart rounded-md bg-brand px-3 py-1.5 text-white hover:bg-brand-dark">Add</button>
            </div>
          </div>
        </article>
      </template>

      <dialog id="productDialog" class="backdrop:bg-black/40 rounded-xl p-0 w-full max-w-2xl">
        <div class="bg-white p-0 overflow-hidden rounded-xl">
          <div class="grid grid-cols-1 md:grid-cols-2">
            <img id="dialogImage" class="h-64 w-full object-cover md:h-full" alt="" />
            <div class="p-6">
              <button id="dialogClose" class="ml-auto block rounded-md border px-2 py-1 text-sm">Close</button>
              <h3 id="dialogTitle" class="mt-2 text-xl font-semibold"></h3>
              <p id="dialogCategory" class="text-sm text-gray-500"></p>
              <p id="dialogPrice" class="mt-3 text-2xl font-bold"></p>
              <p id="dialogDescription" class="mt-3 text-gray-700"></p>
              <div class="mt-4 flex items-center gap-2">
                <button id="dialogAdd" class="rounded-md bg-brand px-4 py-2 text-white hover:bg-brand-dark">Add to cart</button>
              </div>
            </div>
          </div>
        </div>
      </dialog>
    </main>

    <aside id="cartDrawer" class="fixed inset-y-0 right-0 z-40 w-full max-w-md translate-x-full bg-white shadow-xl transition-transform">
      <div class="flex h-full flex-col">
        <div class="flex items-center justify-between border-b p-4">
          <h3 class="text-lg font-semibold">Your Cart</h3>
          <button id="cartClose" class="rounded-md border px-2 py-1 text-sm">Close</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto divide-y"></div>
        <div class="border-t p-4 space-y-2">
          <div class="flex justify-between text-sm"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
          <div class="flex justify-between text-sm"><span>Shipping</span><span id="shipping">$0.00</span></div>
          <div class="flex justify-between text-base font-semibold"><span>Total</span><span id="total">$0.00</span></div>
          <button id="checkoutButton" class="mt-2 w-full rounded-md bg-brand px-4 py-2 text-white hover:bg-brand-dark">Checkout</button>
        </div>
      </div>
    </aside>

    <dialog id="checkoutDialog" class="backdrop:bg-black/40 rounded-xl p-0 w-full max-w-xl">
      <div class="bg-white p-6 rounded-xl">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold">Checkout</h3>
          <button id="checkoutClose" class="rounded-md border px-2 py-1 text-sm">Close</button>
        </div>
        <form id="checkoutForm" class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium">Email</label>
            <input name="email" type="email" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div>
            <label class="block text-sm font-medium">First name</label>
            <input name="firstName" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div>
            <label class="block text-sm font-medium">Last name</label>
            <input name="lastName" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium">Address</label>
            <input name="address" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div>
            <label class="block text-sm font-medium">City</label>
            <input name="city" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div>
            <label class="block text-sm font-medium">Postal code</label>
            <input name="postal" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium">Card (test)</label>
            <input name="card" placeholder="4242 4242 4242 4242" required class="mt-1 w-full rounded-md border-gray-300 focus:border-brand focus:ring-brand" />
          </div>
          <div class="sm:col-span-2">
            <button class="w-full rounded-md bg-brand px-4 py-2 text-white hover:bg-brand-dark">Pay now</button>
          </div>
        </form>
        <p id="checkoutStatus" class="mt-2 text-sm text-gray-600"></p>
      </div>
    </dialog>

    <footer class="border-t py-8 mt-10">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
        <p>&copy; <span id="year"></span> ShopLite. All rights reserved.</p>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
